<section class="submit-unit">
    <div class="container">
        <div class="submit-unit-wrapper">
            <h1>Add new property</h1>
            <form class="submit-unit-form">
                <div class="submit-unit-inner">
                    <div class="submit-unit-left">
                        <fieldset>
                            <div class="input-group">
                                <label for="s-text">
                                    Title
                                    <input type="text" id="s-text" required>
                                </label>
                            </div>
                            <div class="inputs-wrapper">
                                <img src="/img/logo-sm.png" width="31" height="43" alt="">
                                <div class="inputs-box">
                                    <div class="inputs-group">
                                        <div class="input-group">
                                            <label for="s-price">
                                                Price, AED
                                                <input type="number" id="s-price" required>
                                            </label>
                                        </div>
                                        <div class="input-group half-width">
                                            <label for="s-sqrt">
                                                Area, square feets
                                                <input type="number" id="s-sqrt" required>
                                            </label>
                                        </div>
                                    </div>
                                    <span class="sqrt-value">Price per square foot:</span>
                                </div>
                            </div>
                            <div class="input-group">
                                <div class="submit-buttons-wrapper">
                                    <span>Bedrooms</span>
                                    <div class="submit-buttons">
                                        <button type="button" class="beds-baths-btn" data-beds="1">1</button>
                                        <button type="button" class="beds-baths-btn" data-beds="2">2</button>
                                        <button type="button" class="beds-baths-btn" data-beds="3">3</button>
                                        <button type="button" class="beds-baths-btn" data-beds="4">4</button>
                                        <button type="button" class="beds-baths-btn" data-beds="5">5+</button>
                                    </div>
                                </div>
                                <div class="submit-buttons-wrapper">
                                    <span>Bathrooms</span>
                                    <div class="submit-buttons">
                                        <button type="button" class="beds-baths-btn" data-baths="1">1</button>
                                        <button type="button" class="beds-baths-btn" data-baths="2">2</button>
                                        <button type="button" class="beds-baths-btn" data-baths="3">3</button>
                                        <button type="button" class="beds-baths-btn" data-baths="4">4</button>
                                    </div>
                                </div>
                            </div>
                            <div class="input-group">
                                <label for="s-desc">
                                    Description
                                    <textarea name="" id="s-desc" ></textarea>
                                </label>
                            </div>
                        </fieldset>
                        <div class="submit-unit-bottom">
                            <span>New units are save as draft for moderation</span>
                            <button class="button green xl" type="submit">
                                <img src="/img/rect.svg" width="12" height="19" alt="">
                                Submit property
                            </button>
                        </div>
                    </div>
                    <div class="submit-unit-right"></div>
                </div>


            </form>
        </div>

    </div>
</section>
